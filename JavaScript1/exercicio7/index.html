<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca GitHub</title>
</head>
<body>
<style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px;
    }.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input {
  width: 70%;
  padding: 10px;
  margin-right: 10px;
}

button {
  padding: 10px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  background: #eee;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.mensagem {
  margin-top: 20px;
  color: red;
}
</style>

<div class="container">
    <h2>Buscar usuários no GitHub</h2><input type="text" id="busca" placeholder="Digite o nome do usuário">
<button onclick="buscarUsuarios()">Buscar</button>

<ul id="lista"></ul>
<div id="mensagem" class="mensagem"></div>
</body>
<script src="script.js"></script>
</html>
