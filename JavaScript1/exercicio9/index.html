<!DOCTYPE html>
<html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinderCat</title>
 </head>
 <body>
  <style>
    body {
     font-family: Arial, sans-serif;
     background: radial-gradient(circle, #ffffff, #8b2525fd);
     padding: 20px;
    }
    .topo {
     position: fixed;
     top: 0;
     width: 100%;
     background: white;
     padding: 10px 0;
     border-bottom: 1px solid #ddd;
    }
    .form-container {
     max-width: 500px;
     margin: auto;
     display: flex;
     align-items: center;
     gap: 10px;
    }
    #feed {
     margin-top: 120px;
     display: flex;
     flex-direction: column;
     align-items: center;
    }
    .post-container {
     border: 1px solid #ddd;
     border-radius: 8px;
     max-width: 400px;
     padding: 16px;
     font-family: Arial, sans-serif;
     background-color: #fff;
     margin-bottom: 20px;
    }
    .user-info {
     display: flex;
     align-items: center;
     margin-bottom: 10px;
    }
    .avatar {
     width: 40px;
     height: 40px;
     border-radius: 50%;
     margin-right: 10px;
    }
    .username {
     font-weight: bold;
    }
    .post-image {
     width: 100%;
     height: auto;
     border-radius: 4px;
     margin-top: 10px;
    }
    textarea {
     display: block;
     margin: 0 auto;
     width: 300px;
     border-radius: 8px;
     border: none;
     padding: 10px;
     resize: none;
    }
    .like-button {
     margin-top: 10px;
     padding: 8px 12px;
     background-color: #007bff;
     color: white;
     border: none;
     border-radius: 4px;
     cursor: pointer;
    }
    .btn-comentar {
     background-color: #9c0d44; /* Azul */
     color: white;
     padding: 10px 20px;
     border: none;
     border-radius: 5px;
     cursor: pointer;
     font-size: 16px;
     transition: background-color 0.3s ease;
    }
    .btn-comentar:hover {
     background-color: #0fb300; /* Azul escuro no hover */
    }
  </style>

  <h1>Bem-vindo ao TinderCat!</h1>
  <header class="topo">
    <div class="form-container">
        <img src="${post.avatar}" class="avatar" onerror="this.src='https://i.pravatar.cc/150'">
        <textarea 
            id="Postagens"
            placeholder="Deixe seu comentário..."
            rows="2">
        </textarea>
        <button class="btn-comentar" onclick="criarPost()">Comentar</button>
    </div>
  </header>
    <div class="user-info">
        <span class="username">@cat_lover_br</span>
    </div>
     <p>Olhem que fofura que encontrei hoje! 😺❤️</p>
     <img id="cat-image" src="" alt="Carregando gatinho..." class="post-image">
     <button class="like-button" onclick="curtirPost()">Curtir</button>
     <div id="feed"></div>
    </div>
  <script src="./script.js"></script>
 </body>
</html>
